name: Build xiaozhi waveshare 2.06 (yuanfang-brain)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          repository: SxLiuYu/xiaozhi-esp32
          ref: main
          path: xiaozhi
          submodules: recursive

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.5

      - name: Install ESP-IDF tools
        run: |
          . ${IDF_PATH}/install.sh

      - name: Build waveshare 2.06 AMOLED
        run: |
          . ${IDF_PATH}/export.sh
          cd xiaozhi/main/boards/waveshare/esp32-s3-touch-amoled-2.06
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-2.06-firmware
          path: |
            xiaozhi/main/boards/waveshare/esp32-s3-touch-amoled-2.06/build/*.bin
            xiaozhi/main/boards/waveshare/esp32-s3-touch-amoled-2.06/build/bootloader/*.bin
            xiaozhi/main/boards/waveshare/esp32-s3-touch-amoled-2.06/build/partition_table/*.bin
            xiaozhi/main/boards/waveshare/esp32-s3-touch-amoled-2.06/build/flash_args
            xiaozhi/main/boards/waveshare/esp32-s3-touch-amoled-2.06/build/flasher_args.json
          retention-days: 14
