name: Build ESP32-S3 Watch Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply yuanfang-brain WS URL
        run: |
          echo 'CONFIG_XIAOZHI_DEFAULT_WS_URL="ws://192.168.1.10:7104"' >> sdkconfig.defaults

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.3.2

      - name: Build firmware
        run: |
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: esp32-watch-firmware
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
            build/flash_args
            build/flasher_args.json
          retention-days: 14
